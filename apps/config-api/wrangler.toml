# config-api — read/write per-user agent configuration.
#
# Backs /agents/me writes: enable/disable, custom instructions, memory
# delete, data export. Audit-logs every mutation.
#
# Reached over a service binding from the Pages Function layer; no
# public route. Authoritative storage is D1 + Vectorize (memory delete).

name = "luna-config-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[observability]
enabled = true

[[d1_databases]]
binding = "D1"
database_name = "luna-platform"
database_id = "PLACEHOLDER_FILL_VIA_TERRAFORM"

[[kv_namespaces]]
binding = "KILL_SWITCH"
id = "PLACEHOLDER_FILL_VIA_TERRAFORM"

# Per-user memory cleanup needs a binding to each agent's Vectorize index.
# Phase 2+ — for now config-api can only ack the request; the actual
# Vectorize delete lands when memory writes do.
