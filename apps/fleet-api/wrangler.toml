# fleet-api — read-side aggregations for /fleet, /fleet/[agent], and the
# data behind /fleet/briefing.
#
# Aggregation discipline: this Worker NEVER returns per-employee data
# unless the caller has the ai-admin role. The query layer enforces it,
# not the response layer — so a bug in the response layer can't leak.

name = "luna-fleet-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[observability]
enabled = true

[[d1_databases]]
binding = "D1"
database_name = "luna-platform"
database_id = "PLACEHOLDER_FILL_VIA_TERRAFORM"

# Workers Analytics Engine for high-volume per-event metrics. D1 holds
# the queryable audit log; AE holds the rollup-friendly stream.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "luna_fleet_events"
