# workflow-control — start, inspect, cancel Cloudflare Workflow instances.
#
# Backs the /workflows control surface. The workflow definitions live in
# the workflow-runner Worker (see apps/workflow-runner/); this Worker
# is the *control plane* — it triggers runs and reads run history.

name = "luna-workflow-control"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[observability]
enabled = true

[[d1_databases]]
binding = "D1"
database_name = "luna-platform"
database_id = "PLACEHOLDER_FILL_VIA_TERRAFORM"

# Service binding to the workflow-runner Worker (which exposes the
# Cloudflare Workflows definitions). Triggering a run = calling this.
[[services]]
binding = "WORKFLOW_RUNNER"
service = "luna-workflow-runner"
