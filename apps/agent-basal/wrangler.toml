# agent-basal — Worker + Durable Object for Basal, Luna's general-purpose
# shared agent. Class A (1:many shared); piiScope=none.
#
# This Worker is reached only via service binding from agent-router; it
# has no public route. The DO holds per-(agent, user) chat history and
# memory pointers. SQLite-backed state means a Lunite's thread persists
# across reconnects without us writing any sync code.

name = "luna-agent-basal"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
preview_urls = false

[observability]
enabled = true

# The Durable Object class for the per-user agent session. The
# Cloudflare Agents SDK requires a DO binding declared this way.
[[durable_objects.bindings]]
name = "AGENT_BASAL_DO"
class_name = "BasalAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BasalAgent"]

# D1: shared platform DB. Audit log writes only.
[[d1_databases]]
binding = "D1"
database_name = "luna-platform"
database_id = "PLACEHOLDER_FILL_VIA_TERRAFORM"

# KV: per-agent kill flags. Read once per invocation.
[[kv_namespaces]]
binding = "KILL_SWITCH"
id = "PLACEHOLDER_FILL_VIA_TERRAFORM"

# Vectorize: per-user memory namespace for Basal. Phase 2 wires save/recall.
[[vectorize]]
binding = "MEMORY"
index_name = "luna-basal-memory"

# AI Gateway: every model call goes through here. Caching, observability,
# per-agent budget caps live in CF dashboard config for this gateway.
[ai]
binding = "AI"

# AI Gateway service binding — the LunaAgent base class uses this for
# every model call. Keeps Anthropic API keys out of the Worker.
# In the dashboard, configure this gateway with anthropic provider +
# the per-agent budget caps documented on /governance.
[[services]]
binding = "AI_GATEWAY"
service = "luna-ai-gateway"
