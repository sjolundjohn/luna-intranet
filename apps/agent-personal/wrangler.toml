# agent-personal — placeholder for the Personal Agent Worker (Class B,
# 1:1 personal). Status: by-request. Wired so the agent-router service
# binding resolves; returns 503 with the canonical "by-request" message
# until Phase 2+ when self-serve provisioning lands.
name = "luna-agent-personal"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[observability]
enabled = true
