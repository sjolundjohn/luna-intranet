# workflow-runner — Cloudflare Workflows definitions.
#
# Each Workflow is durable — automatic retries, step-level checkpoints,
# arbitrary sleeps. The cron trigger ticks the daily fleet briefing
# and the morning briefing fan-out workflow.

name = "luna-workflow-runner"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[observability]
enabled = true

# Workflow class registrations. Each `class_name` maps to a class
# exported from src/index.ts that extends `WorkflowEntrypoint`.
[[workflows]]
binding = "MORNING_BRIEFING"
name = "morning-briefing"
class_name = "MorningBriefingWorkflow"

[[workflows]]
binding = "DAILY_FLEET_BRIEFING"
name = "daily-fleet-briefing"
class_name = "DailyFleetBriefingWorkflow"

[[workflows]]
binding = "SUPPORT_TRIAGE"
name = "support-triage"
class_name = "SupportTriageWorkflow"

# Cron triggers — wired via Cloudflare's built-in scheduler. Phase 3
# populates the actual Workflow steps; today these classes exist as
# typed scaffolds so the bindings resolve.
[triggers]
crons = [
  "0 7 * * 1-5",   # morning-briefing — 7am weekdays (per-Lunite fan-out lives in the workflow)
  "0 18 * * *",    # daily-fleet-briefing — 6pm daily
  "0 */2 * * *",   # support-triage — every 2 hours
]

[[d1_databases]]
binding = "D1"
database_name = "luna-platform"
database_id = "PLACEHOLDER_FILL_VIA_TERRAFORM"

# Service binding to the agent-router so workflow steps that need an LLM
# call go through the same dispatch + audit path everything else does.
[[services]]
binding = "AGENT_ROUTER"
service = "luna-agent-router"

# Queues — fan-out from briefing workflow to per-team summarizers.
[[queues.producers]]
queue = "luna-briefing-fanout"
binding = "BRIEFING_QUEUE"

[[queues.consumers]]
queue = "luna-briefing-fanout"
max_batch_size = 10
max_batch_timeout = 30

# R2 — audio episodes for the briefing podcast (Phase 4).
[[r2_buckets]]
binding = "BRIEFINGS"
bucket_name = "luna-briefings"
