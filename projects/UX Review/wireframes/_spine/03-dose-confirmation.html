<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Luna iOS Spine · 03 Dose Confirmation</title>
<link rel="stylesheet" href="../../css/tokens.css" />
<style>
/* ============================================================
   LUNA SPINE — shared frame + dark-surface system
   This block is IDENTICAL across all 7 spine screens. It is the
   locked frame + component kit. Do not fork per-screen.
   ============================================================ */
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-brand);
  background:var(--color-cloud-lilac);
  color:var(--color-ink);
  -webkit-font-smoothing:antialiased;
  display:flex; justify-content:center; align-items:flex-start;
  min-height:100vh; padding:40px 16px;
}
/* ---- iPhone frame: realistic BLACK BEZEL (Dynamic Island cue) ---- */
.phone{
  width:414px; max-width:100%; margin:0 auto;
  background:linear-gradient(155deg,#2b2b30,#0b0b0d 42%,#000 100%);
  border-radius:56px; padding:12px;
  box-shadow:0 0 0 2px #3a3a40, var(--shadow-modal);
}
.screen{
  position:relative; width:100%; min-height:780px;
  border-radius:34px; overflow:hidden;
  display:flex; flex-direction:column;
  background:linear-gradient(to bottom,
    var(--color-midnight-deep), var(--color-midnight) 60%, var(--color-midnight-floor));
  color:var(--color-on-dark);
}
/* Dynamic Island cue floating over the status bar */
.screen::before{
  content:""; position:absolute; top:11px; left:50%; transform:translateX(-50%);
  width:104px; height:28px; border-radius:999px; background:#000; z-index:40;
  pointer-events:none;
}
.statusbar{
  height:54px; flex:none; display:flex; align-items:flex-end;
  justify-content:space-between; padding:0 26px 8px;
  font-size:14px; font-weight:600; color:var(--color-on-dark);
}
.statusbar .clock{font-variant-numeric:tabular-nums;}
.statusbar .right{display:flex; align-items:center; gap:6px;}
.statusbar svg{display:block;}
.homebar{height:34px; flex:none; display:flex; align-items:center; justify-content:center;}
.homebar::after{content:""; width:134px; height:5px; border-radius:999px; background:rgba(255,255,255,0.30);}
.content{flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column;}
.screen .large-title,.screen .title-1,.screen .title-2,.screen .title-3,
.screen .headline,.screen .body,.screen .callout,.screen .subhead,
.screen .footnote,.screen .caption-1,.screen .caption-2{color:var(--color-on-dark);}
.muted{color:var(--color-on-dark-sub)!important;}
.accent{color:var(--color-moonlight)!important;}
.card-dark{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:var(--radius-card);
  padding:var(--space-md);
}
.card-light{
  background:var(--color-white);
  border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);
  color:var(--color-ink);
}
.btn{
  width:100%; height:52px; border:none; border-radius:var(--radius-pill);
  font-family:var(--font-brand); font-size:16px; font-weight:700;
  letter-spacing:-0.005em; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:transform 140ms ease, box-shadow 140ms ease;
}
.btn.primary{background:var(--color-moonlight); color:var(--color-midnight); box-shadow:0 3px 14px rgba(104,210,223,0.40);}
.btn.secondary{background:transparent; color:var(--color-on-dark); border:1.5px solid rgba(255,255,255,0.30);}
.btn.ghost{background:transparent; color:var(--color-moonlight); font-weight:700; height:auto; padding:8px;}
.btn:active{transform:translateY(1px) scale(0.995);}
.tabbar{
  flex:none; display:flex; padding:10px 8px 4px;
  background:rgba(3,22,50,0.55);
  border-top:1px solid rgba(255,255,255,0.08);
  backdrop-filter:saturate(160%) blur(12px);
}
.tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  background:none; border:none; cursor:pointer; padding:4px 0;
  color:var(--color-on-dark-sub); font-family:var(--font-brand);}
.tab span{font-size:11px; font-weight:600;}
.tab.active{color:var(--color-moonlight);}
.tab svg{display:block;}
.statuscard{position:relative; display:flex; flex-direction:column; align-items:center; text-align:center; gap:6px;}
.statuscard .info{position:absolute; top:0; right:0; color:var(--color-on-dark-sub);}
.statuscard .sep{display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.12); width:100%;}
.glucose{display:flex; align-items:center; justify-content:center; gap:10px;}
.glucose .num{font-size:84px; font-weight:700; line-height:1; letter-spacing:-0.03em; color:var(--color-on-dark); font-variant-numeric:tabular-nums;}
.insight{display:flex; gap:14px; align-items:flex-start;}
.insight .ic{flex:none; margin-top:2px; color:var(--color-moonlight);}
.flag{
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(249,205,134,0.10);
  border:1px dashed var(--color-warning);
  border-radius:var(--radius-chip); padding:5px 9px;
  font-size:10px; font-weight:600; color:var(--color-warning);
  letter-spacing:0.02em; font-family:var(--font-brand);
}
.flag .k{font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; opacity:0.85;}
.token-flag{
  display:inline-flex; align-items:baseline; padding:1px 8px; border-radius:5px;
  background:rgba(249,205,134,0.18); border:1px dashed var(--color-warning);
  color:var(--color-warning); font-weight:700; font-variant-numeric:tabular-nums;
  letter-spacing:0.02em;
}
.step-badge{display:inline-flex; align-items:center; gap:6px;
  font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--color-moonlight); margin:0 0 6px;}
.step-badge .dot{width:4px; height:4px; border-radius:999px; background:var(--color-moonlight);}
.prog-head{flex:none; padding-top:4px;}
.prog-row{height:44px; display:flex; align-items:center; padding:0 16px; gap:8px;}
.prog-row .back{background:none; border:none; padding:0; cursor:pointer; width:24px; height:24px;
  color:var(--color-moonlight); font-size:26px; line-height:1; display:flex; align-items:center; justify-content:center;}
.prog-row .title{flex:1; font-size:13px; font-weight:500; color:var(--color-on-dark-sub);}
.prog-row .count{font-size:12px; font-weight:500; color:var(--color-on-dark-sub); font-variant-numeric:tabular-nums;}
.prog-bar{margin:0 20px; height:3px; background:rgba(255,255,255,0.12); border-radius:2px; overflow:hidden;}
.prog-bar > i{display:block; height:100%; background:var(--color-moonlight); border-radius:2px;}
.conn-row{display:flex; align-items:center; justify-content:space-between;
  background:rgba(104,210,223,0.08); border:1px solid rgba(104,210,223,0.25);
  border-radius:12px; padding:13px 14px;}
.conn-row .lbl{font-size:14px; font-weight:600; color:var(--color-on-dark);}
.conn-row .stat{display:flex; align-items:center; gap:7px; font-size:12px; font-weight:600;}
.conn-row .stat .ok{width:8px; height:8px; border-radius:50%; background:var(--color-success-light);
  box-shadow:0 0 8px rgba(176,249,179,0.6);}
.conn-row .stat .ok-txt{color:var(--color-success-light);}
.pad{padding:0 var(--space-sm);}
.stack{display:flex; flex-direction:column;}
/* Luna wordmark — small, top-left, on EVERY screen (brand: never stretch/recolor).
   Dedicated flex-none brand row directly under the status bar, so it never
   collides with the clock (left of status bar) or the Dynamic-Island cue (center). */
.brandbar{flex:none; display:flex; align-items:center; padding:0 0 4px 22px;}
.brandbar .luna-mark{height:15px; width:auto; display:block; opacity:0.95;}
hr.divider{border:none; border-top:1px solid rgba(255,255,255,0.10); margin:0;}

/* screen-03 only: home indicator must sit ABOVE the dose sheet */
.homebar{position:relative; z-index:30;}
/* dim backdrop scrim under the sheet */
.scrim{position:absolute; inset:0; background:rgba(3,22,50,0.55); z-index:10;}

/* ---- DOSE-CONFIRMATION SHEET (reused from dose-confirmation/index.html, "increase") ---- */
.sheet-host{position:absolute; left:0; right:0; bottom:0; z-index:20;}
.sheet{background:var(--color-white); border-top-left-radius:24px; border-top-right-radius:24px;
  padding:14px 26px 26px; box-shadow:0 -8px 40px rgba(4,30,66,0.18); font-family:var(--font-brand);}
.grabber{width:40px; height:5px; border-radius:999px; background:var(--color-lunar-lavender); margin:0 auto 16px;}
.hdr{display:flex; align-items:center; gap:9px; margin-bottom:14px;}
.moon{width:24px; height:24px; border-radius:50%; background:var(--color-midnight); position:relative; overflow:hidden; flex:none;}
.moon::before{content:""; position:absolute; right:-5px; top:2px; width:15px; height:15px; border-radius:50%; background:var(--color-moonlight);}
.moon::after{content:""; position:absolute; right:-1px; top:4px; width:11px; height:11px; border-radius:50%; background:var(--color-midnight);}
.eyebrow{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--color-slate);}
.sheet h2{margin:0 0 14px; font-size:22px; font-weight:700; letter-spacing:-0.01em; color:var(--color-ink); line-height:1.25;}
.valrow{display:flex; align-items:baseline; gap:12px; margin-bottom:8px;}
.val{font-family:var(--font-display); font-size:72px; font-weight:700; line-height:0.95; letter-spacing:-0.03em; color:var(--color-midnight);}
.unit{font-family:var(--font-display); font-size:28px; font-weight:700; color:var(--color-midnight); letter-spacing:-0.01em;}
.chip{display:inline-flex; align-items:center; gap:5px; padding:5px 11px 5px 9px; border-radius:4px; background:var(--color-moonlight-tint, #E8FCFF); color:var(--color-info); font-size:13px; font-weight:600;}
.prev{font-size:13px; color:var(--color-slate); margin-bottom:14px;}
.prev s{text-decoration:line-through;}
.rationale{margin:0 0 18px; font-size:15px; line-height:1.5; color:var(--color-graphite);}
.ackbox{background:var(--color-cloud-lilac); border-radius:16px; padding:14px 18px 12px; margin-bottom:18px;}
.ackbox .h{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--color-graphite); margin-bottom:4px;}
.ack{display:flex; align-items:flex-start; gap:14px; width:100%; min-height:44px; padding:10px 4px; background:none; border:none; text-align:left; cursor:pointer; font:inherit;}
.ack .box{width:26px; height:26px; flex:none; margin-top:1px; border-radius:8px; border:1.5px solid var(--color-border-strong); background:var(--color-white); display:flex; align-items:center; justify-content:center; transition:background 160ms;}
.ack[aria-checked="true"] .box{border:none; background:var(--color-midnight);}
.ack .lbl{font-size:15px; font-weight:600; line-height:1.4; color:var(--color-ink);}
.ack .sub{font-size:13px; line-height:1.4; color:var(--color-slate);}
.ackdiv{height:1px; background:var(--color-border-subtle); margin:2px 0 2px 40px;}
.slide{display:flex; flex-direction:column; gap:8px;}
.track{position:relative; height:60px; border-radius:999px; background:var(--color-cloud-lilac); overflow:hidden; user-select:none; touch-action:none;}
.track.enabled{background:var(--color-periwinkle-mist);}
.track.done{background:var(--color-success-bg);}
.trail{position:absolute; left:0; top:0; bottom:0; width:30px; background:#C9F8FE;}
.track.done .trail{background:var(--color-success-light);}
.tlabel{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:8px; pointer-events:none; font-size:15px; font-weight:600; color:var(--color-disabled);}
.track.enabled .tlabel{color:var(--color-midnight);}
.track.done .tlabel{color:var(--color-success);}
.thumb{position:absolute; top:4px; left:4px; width:52px; height:52px; border-radius:50%; background:var(--color-white); border:1px solid var(--color-border-default); display:flex; align-items:center; justify-content:center;}
.track.enabled .thumb{background:var(--color-midnight); border:none; box-shadow:0 2px 8px rgba(4,30,66,0.20); cursor:grab;}
.track.done .thumb{background:var(--color-success); border:none;}
.hint{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--color-slate); padding-left:4px;}
.skip{display:flex; justify-content:center; margin-top:14px;}
.skip button{background:none; border:none; font:inherit; cursor:pointer; font-size:15px; font-weight:600; color:var(--color-slate); padding:8px 16px;}

/* dimmed Home backdrop content tweak */
.backdrop{filter:blur(1px);}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="statusbar">
      <span class="clock">10:18</span>
      <span class="right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="#fff"/><rect x="5" y="4" width="3" height="8" rx="1" fill="#fff"/><rect x="10" y="1" width="3" height="11" rx="1" fill="#fff"/><rect x="15" y="1" width="3" height="11" rx="1" fill="#fff" opacity="0.4"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="0.5" y="1" width="20" height="10" rx="2.5" stroke="#fff" opacity="0.5"/><rect x="2" y="2.5" width="16" height="7" rx="1.2" fill="#fff"/><rect x="21.5" y="4" width="1.5" height="4" rx="0.75" fill="#fff" opacity="0.5"/></svg>
      </span>
    </div>

    <!-- dimmed Home backdrop -->
    <div class="content backdrop" aria-hidden="true">
      <div class="pad" style="padding-top:8px;">
        <div class="title-2" style="font-weight:700;">Good night, moonbeam</div>
        <div class="footnote muted" style="margin-top:2px;">Luna's on watch · session started 10:42 PM</div>
      </div>
      <div class="pad" style="margin-top:18px;">
        <div class="card-dark statuscard">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#68D2DF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12.5l2 2 4.5-5"/></svg>
          <div class="headline" style="font-weight:700;">Luna</div>
          <div class="subhead muted">Active · watching overnight</div>
        </div>
      </div>
      <div class="pad" style="margin-top:16px; text-align:center;">
        <div class="glucose"><span class="num">112</span></div>
      </div>
    </div>

    <!-- dim scrim -->
    <div class="scrim"></div>

    <!-- DOSE CONFIRMATION SHEET (increase state) -->
    <div class="sheet-host" id="host"></div>

    <div class="homebar"></div>
  </div>
</div>

<script>
/* Reused verbatim from dose-confirmation/index.html — "increase" variant only. */
const ICON = {
  up:"M12 19V5M5 12l7-7 7 7", check:"M20 6L9 17l-5-5",
  arrowRight:"M5 12h14M13 5l7 7-7 7",
  info:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 16v-4M12 8h.01"
};
function svg(name, size=18, color="currentColor", sw=1.5){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="${ICON[name]}"/></svg>`;
}
const V=14, U="U", P=12;
const host=document.getElementById('host');
host.innerHTML = `<div class="sheet"><div class="grabber"></div>
  <div class="hdr"><div class="moon"></div><span class="eyebrow">Hypo Shield</span></div>
  <h2>A new nightly basal dose</h2>
  <div class="valrow"><span class="val">${V}</span><span class="unit">${U}</span>
    <span class="chip">${svg('up',15,'var(--color-info)',2.2)} Increase</span></div>
  <div class="prev">Current dose <s>${P} ${U}</s></div>
  <p class="rationale">Over the past several nights, Luna Eclipse has been monitoring your glucose. We've noticed it's drifted up — you may need a bit more of your basal insulin.</p>
  <div class="ackbox">
    <div class="h">To act on this, do both</div>
    <button class="ack" id="ack1" role="checkbox" aria-checked="false"><span class="box"></span>
      <span><span class="lbl">Set your long-acting insulin dose to ${V} units in Luna's settings</span><br><span class="sub">Updates the value Luna programs for you</span></span></button>
    <div class="ackdiv"></div>
    <button class="ack" id="ack2" role="checkbox" aria-checked="false"><span class="box"></span>
      <span><span class="lbl">Take your ${V}-unit long-acting dose</span><br><span class="sub">Your actual injection tonight</span></span></button>
  </div>
  <div class="slide">
    <div class="track" id="track" role="slider" tabindex="-1" aria-label="Slide to confirm both" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-disabled="true">
      <div class="trail" id="trail"></div>
      <div class="tlabel" id="tlabel">Slide to confirm both</div>
      <div class="thumb" id="thumb">${svg('arrowRight',22,'var(--color-disabled)',2.2)}</div>
    </div>
    <div class="hint" id="hint">${svg('info',14,'var(--color-slate)')} Acknowledge both actions above to continue</div>
  </div>
  <div class="skip"><button type="button">Skip this recommendation</button></div></div>`;

(function wireSlider(){
  const ack1=document.getElementById('ack1'), ack2=document.getElementById('ack2');
  const track=document.getElementById('track'), thumb=document.getElementById('thumb'),
        trail=document.getElementById('trail'), tlabel=document.getElementById('tlabel'), hint=document.getElementById('hint');
  let s1=false,s2=false,p=0,done=false,dragging=false;
  const THUMB=52,PAD=4;
  const enabled=()=> s1 && s2 && !done;
  function maxTravel(){ return track.clientWidth - THUMB - PAD*2; }
  function paint(){
    const both=s1&&s2;
    track.classList.toggle('enabled', both && !done);
    track.classList.toggle('done', done);
    track.setAttribute('aria-disabled', (!both&&!done)?'true':'false');
    track.tabIndex = (both && !done) ? 0 : -1;
    const x = PAD + p*maxTravel();
    thumb.style.left = x+'px';
    trail.style.width = (x+THUMB/2)+'px';
    track.setAttribute('aria-valuenow', Math.round(p*100));
    tlabel.style.opacity = done?1:Math.max(0,1-p*2.2);
    if (done){ tlabel.innerHTML = svg('check',18,'var(--color-success)',2.4)+' Confirmed'; thumb.innerHTML=svg('check',22,'var(--color-white)',2.2); }
    else { tlabel.textContent='Slide to confirm both'; thumb.innerHTML=svg('arrowRight',22, both?'var(--color-moonlight)':'var(--color-disabled)',2.2); }
    hint.style.display = (both||done)?'none':'flex';
  }
  function toggle(btn,which){ btn.addEventListener('click',()=>{ if(done) return;
    if(which===1){s1=!s1;} else {s2=!s2;}
    const on = which===1?s1:s2;
    btn.setAttribute('aria-checked', on?'true':'false');
    btn.querySelector('.box').innerHTML = on ? svg('check',16,'var(--color-moonlight)',2.4) : '';
    if(!(s1&&s2)) p=0; paint(); }); }
  toggle(ack1,1); toggle(ack2,2);
  function moveTo(clientX){ const r=track.getBoundingClientRect(); const x=clientX-r.left-PAD-THUMB/2;
    p=Math.max(0,Math.min(1,x/maxTravel())); paint(); }
  thumb.addEventListener('pointerdown',e=>{ if(!enabled())return; dragging=true; thumb.setPointerCapture(e.pointerId); moveTo(e.clientX); });
  window.addEventListener('pointermove',e=>{ if(dragging) moveTo(e.clientX); });
  window.addEventListener('pointerup',()=>{ if(!dragging)return; dragging=false;
    if(p>=0.85){ done=true; p=1; } else { p=0; } paint(); });
  track.addEventListener('keydown',e=>{ if(!enabled())return;
    if(e.key==='Enter'||e.key===' '||e.key==='ArrowRight'){ e.preventDefault(); done=true; p=1; paint(); } });
  paint();
})();
</script>
</body>
</html>
