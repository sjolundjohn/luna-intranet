<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apollo Training — Luna DS v1.0 · Interactive Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- D-DIN — Luna's primary brand font (SIL OFL-1.1). Loaded at Regular + Bold. -->
  <style>
    @font-face {
      font-family: 'D-DIN';
      src: url('https://cdn.jsdelivr.net/npm/@fontsource/d-din@1.0.0/files/d-din-latin-400-normal.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'D-DIN';
      src: url('https://cdn.jsdelivr.net/npm/@fontsource/d-din@1.0.0/files/d-din-latin-700-normal.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'D-DIN';
      src: url('https://cdn.jsdelivr.net/npm/@fontsource/d-din@1.0.0/files/d-din-latin-500-normal.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/npm/@fontsource/d-din@1.0.0/files/d-din-latin-400-normal.woff2') format('woff2');
      font-weight: 500 600;
      font-style: normal;
      font-display: swap;
    }
    html, body { margin: 0; padding: 0; }
    body {
      background: #F2F3FA;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    /* Keyframes used by the design */
    @keyframes lunaPulseOuter {
      0%, 100% { transform: scale(1); opacity: 0.45; }
      50% { transform: scale(1.18); opacity: 0.95; }
    }
    @keyframes lunaPulseMid {
      0%, 100% { transform: scale(1); opacity: 0.65; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes lunaSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes lunaBlink {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    @keyframes lunaFadeIn {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes lunaPopIn {
      0% { transform: scale(0.4); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes lunaShimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    @keyframes lunaOrbit {
      to { transform: rotate(360deg); }
    }
    @keyframes lunaOrbitDot {
      0% { transform: translateX(-50%) rotate(0deg) translateY(0); }
      100% { transform: translateX(-50%) rotate(360deg) translateY(0); }
    }
    @keyframes lunaMorningFade {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes lunaNotifSlide {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* scrollbar (tweaks panel) */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #BAC4D9; border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel, pinned (required) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="system.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
