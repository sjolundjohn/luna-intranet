<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{
--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--white:#FFFFFF;
--soft-paper:#FBFDFE;--cloud-lilac:#F2F3FA;--periwinkle:#E7EBF8;--pebble:#BAC6D9;
--graphite:#535D65;--slate:#7A8892;--lavender:#D6D3E9;
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:var(--white);color:var(--midnight);padding:20px 24px;-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 16px;}
.mono{font-family:var(--mono);}
</style></head><body>
<p class="lbl">Spacing · 8pt base · 4pt half-step</p>
<div style="display:flex;align-items:center;gap:14px;padding:4px 0;"><span class="mono" style="font-size:11px;width:54px;flex:none;font-weight:700;">xxs</span><span style="height:16px;width:4px;background:var(--moonlight);border-radius:3px;flex:none;"></span><span class="mono" style="font-size:10px;color:var(--slate);width:42px;flex:none;">4pt</span><span style="font-size:12px;color:var(--graphite);">icon-to-label (half-step)</span></div>
<div style="display:flex;align-items:center;gap:14px;padding:4px 0;"><span class="mono" style="font-size:11px;width:54px;flex:none;font-weight:700;">xs</span><span style="height:16px;width:8px;background:var(--moonlight);border-radius:3px;flex:none;"></span><span class="mono" style="font-size:10px;color:var(--slate);width:42px;flex:none;">8pt</span><span style="font-size:12px;color:var(--graphite);">related elements, inner padding</span></div>
<div style="display:flex;align-items:center;gap:14px;padding:4px 0;"><span class="mono" style="font-size:11px;width:54px;flex:none;font-weight:700;">sm</span><span style="height:16px;width:16px;background:var(--moonlight);border-radius:3px;flex:none;"></span><span class="mono" style="font-size:10px;color:var(--slate);width:42px;flex:none;">16pt</span><span style="font-size:12px;color:var(--graphite);">screen margins, row padding</span></div>
<div style="display:flex;align-items:center;gap:14px;padding:4px 0;"><span class="mono" style="font-size:11px;width:54px;flex:none;font-weight:700;">md</span><span style="height:16px;width:24px;background:var(--moonlight);border-radius:3px;flex:none;"></span><span class="mono" style="font-size:10px;color:var(--slate);width:42px;flex:none;">24pt</span><span style="font-size:12px;color:var(--graphite);">card padding, sections</span></div>
<div style="display:flex;align-items:center;gap:14px;padding:4px 0;"><span class="mono" style="font-size:11px;width:54px;flex:none;font-weight:700;">lg</span><span style="height:16px;width:32px;background:var(--moonlight);border-radius:3px;flex:none;"></span><span class="mono" style="font-size:10px;color:var(--slate);width:42px;flex:none;">32pt</span><span style="font-size:12px;color:var(--graphite);">between major sections</span></div>
<div style="display:flex;align-items:center;gap:14px;padding:4px 0;"><span class="mono" style="font-size:11px;width:54px;flex:none;font-weight:700;">xl</span><span style="height:16px;width:48px;background:var(--moonlight);border-radius:3px;flex:none;"></span><span class="mono" style="font-size:10px;color:var(--slate);width:42px;flex:none;">48pt</span><span style="font-size:12px;color:var(--graphite);">large breathing room</span></div>
<div style="display:flex;align-items:center;gap:14px;padding:4px 0;"><span class="mono" style="font-size:11px;width:54px;flex:none;font-weight:700;">xxl</span><span style="height:16px;width:56px;background:var(--moonlight);border-radius:3px;flex:none;"></span><span class="mono" style="font-size:10px;color:var(--slate);width:42px;flex:none;">56pt</span><span style="font-size:12px;color:var(--graphite);">hero / onboarding</span></div></body></html>
