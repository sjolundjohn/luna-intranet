<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Status card</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--graphite:#535D65;--slate:#7A8892;--pebble:#BAC6D9;}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:#F2F3FA;color:var(--midnight);padding:20px 24px;-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 16px;}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 16px rgba(4,30,66,0.06);}
</style></head><body>
<p class="lbl">Status card · top of Dashboard</p>
<div class="card" style="max-width:380px;padding:22px 24px;position:relative;">
  <div style="position:absolute;top:16px;right:16px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7A8892" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg></div>
  <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#68D2DF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12.5l2 2 4.5-5"/></svg>
    <div style="font-weight:700;font-size:17px;line-height:1.2;">Luna</div>
    <div style="font-size:15px;color:var(--graphite);">Active · watching overnight</div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--pebble);">
    <span style="font-weight:700;font-size:16px;">1.2 <span style="font-size:12px;color:var(--graphite);font-weight:400;">U</span></span>
    <span style="font-size:13px;color:var(--slate);">active insulin</span>
  </div>
</div></body></html>
