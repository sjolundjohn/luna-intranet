<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Toast</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{
--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--white:#FFFFFF;
--soft-paper:#FBFDFE;--cloud-lilac:#F2F3FA;--periwinkle:#E7EBF8;--pebble:#BAC6D9;
--graphite:#535D65;--slate:#7A8892;--lavender:#D6D3E9;--step:#F5F6F8;
--success:#2E7D32;--warning:#F9CD86;--critical:#8E3655;
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:var(--cloud-lilac);color:var(--midnight);padding:20px 24px;-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 16px;}
.mono{font-family:var(--mono);}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 16px rgba(4,30,66,0.06);}
</style></head><body>
<p class="lbl">Toast notification</p>
<div style="display:flex;justify-content:center;padding:14px 0;">
  <div style="display:inline-flex;align-items:center;gap:12px;background:var(--midnight);color:#fff;padding:13px 22px;border-radius:999px;box-shadow:0 8px 24px rgba(4,30,66,0.24);">
    <span style="color:var(--moonlight);display:flex;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.5l2.5 2.5 4.5-5"/></svg></span>
    <span style="font-size:15px;font-weight:700;">Session saved</span>
  </div>
</div></body></html>
