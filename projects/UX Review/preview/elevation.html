<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Elevation</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{
--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--white:#FFFFFF;
--soft-paper:#FBFDFE;--cloud-lilac:#F2F3FA;--periwinkle:#E7EBF8;--pebble:#BAC6D9;
--graphite:#535D65;--slate:#7A8892;--lavender:#D6D3E9;
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:var(--white);color:var(--midnight);padding:20px 24px;-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 16px;}
.mono{font-family:var(--mono);}
</style></head><body>
<p class="lbl">Elevation · subtle iOS drop shadows</p>
<div style="display:flex;gap:20px;flex-wrap:wrap;padding:8px 0 16px;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;"><div style="width:100%;height:56px;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(4,30,66,0.05);"></div><div style="font-size:11px;font-weight:700;">raised</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;"><div style="width:100%;height:56px;background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(4,30,66,0.06);"></div><div style="font-size:11px;font-weight:700;">card</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;"><div style="width:100%;height:56px;background:#fff;border-radius:16px;box-shadow:0 -8px 40px rgba(4,30,66,0.16);"></div><div style="font-size:11px;font-weight:700;">modal</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;"><div style="width:100%;height:56px;background:#041E42;border-radius:999px;box-shadow:0 8px 24px rgba(4,30,66,0.24);"></div><div style="font-size:11px;font-weight:700;">toast</div></div>
</div>
<div style="font-size:12px;color:var(--graphite);">Android maps these to tonal elevation — match conceptually, differ in execution.</div></body></html>
