<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Midnight gradient</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--graphite:#535D65;--slate:#7A8892;--on-dark-sub:#ACC1DF;}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:#fff;color:var(--midnight);-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 14px;}
.mono{font-family:var(--mono);}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 16px rgba(4,30,66,0.06);}
</style></head><body>
<div style="background:linear-gradient(to bottom,#133465 0%,#041E42 55%,#031632 100%);padding:28px 30px 36px;min-height:280px;color:#fff;">
  <img src="../assets/luna-on-dark.svg" style="height:34px;display:block;">
  <div style="margin-top:40px;font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;">Sleep well.<br>Wake up well. Better.</div>
  <div style="color:var(--on-dark-sub);font-size:15px;margin-top:12px;max-width:42ch;line-height:1.5;">Luna takes the watch overnight. Logo sits in the upper third for a guardian, omnipresent feel.</div>
  <div class="mono" style="display:flex;gap:14px;margin-top:22px;font-size:10px;color:var(--on-dark-sub);">
    <span>● #133465</span><span>● #041E42</span><span>● #031632</span>
  </div>
</div></body></html>
