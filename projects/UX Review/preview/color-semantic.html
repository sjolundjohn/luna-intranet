<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Semantic palette</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{
--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--white:#FFFFFF;
--soft-paper:#FBFDFE;--cloud-lilac:#F2F3FA;--periwinkle:#E7EBF8;--pebble:#BAC6D9;
--graphite:#535D65;--slate:#7A8892;--lavender:#D6D3E9;--step:#F5F6F8;
--deep:#133465;--floor:#031632;--on-dark-sub:#ACC1DF;
--success:#2E7D32;--success-light:#B0F9B3;--info:#68D2DF;--warning:#F9CD86;--critical:#8E3655;
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:var(--white);color:var(--midnight);padding:20px 24px;-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 16px;}
.mono{font-family:var(--mono);}
.sw{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
.chip{height:60px;border-radius:12px;border:1px solid rgba(4,30,66,0.08);}
.nm{font-size:12px;font-weight:700;}
.hx{font-family:var(--mono);font-size:10px;color:var(--slate);}
</style></head><body>
<p class="lbl">Alert &amp; semantic · pair color with icon/label</p>
<div style="display:flex;gap:10px;">
<div class="sw"><div class="chip" style="background:#B0F9B3;"></div><div class="nm">Light Emerald</div><div class="hx">#B0F9B3 · success bg</div></div>
<div class="sw"><div class="chip" style="background:#2E7D32;"></div><div class="nm">Emerald</div><div class="hx">#2E7D32 · success</div></div>
<div class="sw"><div class="chip" style="background:#68D2DF;"></div><div class="nm">Moonlight</div><div class="hx">#68D2DF · info</div></div>
<div class="sw"><div class="chip" style="background:#F9CD86;"></div><div class="nm">Clinical Amber</div><div class="hx">#F9CD86 · warning</div></div>
<div class="sw"><div class="chip" style="background:#8E3655;"></div><div class="nm">Plum Depth</div><div class="hx">#8E3655 · critical</div></div>
</div>
<div style="font-size:12px;color:var(--graphite);margin-top:14px;">No reds or harsh oranges. Plum Depth is reserved for critical only — keep it rare and significant.</div></body></html>
