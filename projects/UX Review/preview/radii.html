<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{
--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--white:#FFFFFF;
--soft-paper:#FBFDFE;--cloud-lilac:#F2F3FA;--periwinkle:#E7EBF8;--pebble:#BAC6D9;
--graphite:#535D65;--slate:#7A8892;--lavender:#D6D3E9;
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:var(--white);color:var(--midnight);padding:20px 24px;-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 16px;}
.mono{font-family:var(--mono);}
</style></head><body>
<p class="lbl">Corner radii</p>
<div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;">
<div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:60px;background:var(--cloud-lilac);border:1px solid var(--pebble);border-radius:8px;"></div><div style="font-size:11px;font-weight:700;">chip</div><div class="mono" style="font-size:10px;color:var(--slate);">8</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:60px;background:var(--cloud-lilac);border:1px solid var(--pebble);border-radius:12px;"></div><div style="font-size:11px;font-weight:700;">input</div><div class="mono" style="font-size:10px;color:var(--slate);">12</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:60px;background:var(--cloud-lilac);border:1px solid var(--pebble);border-radius:20px;"></div><div style="font-size:11px;font-weight:700;">card</div><div class="mono" style="font-size:10px;color:var(--slate);">20</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:60px;background:var(--cloud-lilac);border:1px solid var(--pebble);border-radius:28px;"></div><div style="font-size:11px;font-weight:700;">modal</div><div class="mono" style="font-size:10px;color:var(--slate);">28</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:120px;height:60px;background:var(--cloud-lilac);border:1px solid var(--pebble);border-radius:999px;"></div><div style="font-size:11px;font-weight:700;">pill</div><div class="mono" style="font-size:10px;color:var(--slate);">pill</div></div>
</div></body></html>
