<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Wordmark</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--graphite:#535D65;--slate:#7A8892;--on-dark-sub:#ACC1DF;}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:#fff;color:var(--midnight);-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 14px;}
.mono{font-family:var(--mono);}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 16px rgba(4,30,66,0.06);}
</style></head><body>
<div style="display:grid;grid-template-columns:1fr 1fr;min-height:220px;">
  <div style="background:#fff;display:flex;align-items:center;justify-content:center;border-right:1px solid #EDF0F7;position:relative;"><img src="../assets/luna-on-white.svg" style="width:58%;max-width:200px;"><span class="mono" style="position:absolute;bottom:10px;left:14px;font-size:10px;color:var(--slate);">on white</span></div>
  <div style="background:linear-gradient(to bottom,#133465,#031632);display:flex;align-items:center;justify-content:center;position:relative;"><img src="../assets/luna-on-dark.svg" style="width:58%;max-width:200px;"><span class="mono" style="position:absolute;bottom:10px;left:14px;font-size:10px;color:var(--on-dark-sub);">on midnight · preferred</span></div>
</div></body></html>
