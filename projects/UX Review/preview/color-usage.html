<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Color usage budget</title>
<style>
@font-face{font-family:"D-DIN";font-style:normal;font-weight:400;src:url("../fonts/d-din-regular.woff2") format("woff2");}
@font-face{font-family:"D-DIN";font-style:normal;font-weight:700;src:url("../fonts/d-din-bold.woff2") format("woff2");}
:root{
--font:"D-DIN",-apple-system,system-ui,sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;
--midnight:#041E42;--moonlight:#68D2DF;--white:#FFFFFF;
--soft-paper:#FBFDFE;--cloud-lilac:#F2F3FA;--periwinkle:#E7EBF8;--pebble:#BAC6D9;
--graphite:#535D65;--slate:#7A8892;--lavender:#D6D3E9;--step:#F5F6F8;
--deep:#133465;--floor:#031632;--on-dark-sub:#ACC1DF;
--success:#2E7D32;--success-light:#B0F9B3;--info:#68D2DF;--warning:#F9CD86;--critical:#8E3655;
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:var(--font);background:var(--white);color:var(--midnight);padding:20px 24px;-webkit-font-smoothing:antialiased;}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);margin:0 0 16px;}
.mono{font-family:var(--mono);}
.sw{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
.chip{height:60px;border-radius:12px;border:1px solid rgba(4,30,66,0.08);}
.nm{font-size:12px;font-weight:700;}
.hx{font-family:var(--mono);font-size:10px;color:var(--slate);}
</style></head><body>
<p class="lbl">Color usage budget · surface area</p>
<div style="display:flex;flex-direction:column;gap:12px;">
  <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="font-weight:700;">Midnight</span><span class="hx">40–50%</span></div><div style="height:10px;border-radius:6px;background:#041E42;width:48%;"></div></div>
  <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="font-weight:700;">Paper / Cloud / Periwinkle</span><span class="hx">35–45%</span></div><div style="height:10px;border-radius:6px;background:#E7EBF8;border:1px solid #BAC6D9;width:42%;"></div></div>
  <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="font-weight:700;">Graphite / Slate</span><span class="hx">≤10%</span></div><div style="height:10px;border-radius:6px;background:#535D65;width:10%;"></div></div>
  <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="font-weight:700;">Moonlight</span><span class="hx">≤7% · info/verification</span></div><div style="height:10px;border-radius:6px;background:#68D2DF;width:7%;"></div></div>
  <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="font-weight:700;">Lunar Lavender</span><span class="hx">≤5%</span></div><div style="height:10px;border-radius:6px;background:#D6D3E9;width:5%;"></div></div>
</div></body></html>
